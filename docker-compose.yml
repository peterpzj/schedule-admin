version: '3.8'

services:
  # Node.js 后端 API
  backend:
    build: ./backend
    container_name: schedule-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data        # SQLite 数据持久化
      - ./uploads:/app/uploads  # 上传文件持久化
      - ./logs:/app/logs        # 日志
    # #P0-7 修复：直接 env_file 加载整个 .env（避免 shell 变量未注入导致 ${VAR:?} 报错）
    #   - 之前 ${JWT_REFRESH_SECRET:?...} 在 server ssh 进来直接跑时，shell 没设该变量
    #     → docker compose 直接报配置错误
    #   - 改用 env_file 后，docker compose 自己读 .env，自动注入所有 KEY
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-please-change-me}
      - DB_PATH=/app/data/schedule.db
      - UPLOAD_DIR=/app/uploads
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - LOGIN_RATE_LIMIT=${LOGIN_RATE_LIMIT:-5}
      - LOGIN_RATE_WINDOW=${LOGIN_RATE_WINDOW:-15m}
      - CREATE_USER_RATE_LIMIT=${CREATE_USER_RATE_LIMIT:-10}
      - CREATE_USER_RATE_WINDOW=${CREATE_USER_RATE_WINDOW:-1h}
      - GLOBAL_RATE_LIMIT=${GLOBAL_RATE_LIMIT:-600}
      - GLOBAL_RATE_WINDOW=${GLOBAL_RATE_WINDOW:-10m}
      # #P0-2 修复：登录失败桶 / token 黑名单 / 限流桶 走持久化 KV 存储
      #   - sqlite：跨进程 + 跨重启保留（多实例部署 / 重启防绕过）
      #   - 默认 memory 适合单实例 + 测试；生产强烈建议 sqlite
      - STORE_BACKEND=${STORE_BACKEND:-sqlite}
      - STORE_SQLITE_PATH=${STORE_SQLITE_PATH:-/app/data/store.db}
    networks:
      - schedule-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Vue 3 前端（用 nginx 服务静态文件）
  frontend:
    image: nginx:alpine
    container_name: schedule-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - schedule-net

networks:
  schedule-net:
    driver: bridge
