version: '3.8'

services:
  # Node.js 后端 API
  backend:
    build: ./backend
    container_name: schedule-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data        # SQLite 数据持久化
      - ./uploads:/app/uploads  # 上传文件持久化
      - ./logs:/app/logs        # 日志
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-please-change-me}
      - DB_PATH=/app/data/schedule.db
      - UPLOAD_DIR=/app/uploads
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    networks:
      - schedule-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Vue 3 前端（用 nginx 服务静态文件）
  frontend:
    image: nginx:alpine
    container_name: schedule-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - schedule-net

networks:
  schedule-net:
    driver: bridge
