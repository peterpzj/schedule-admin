# 诊室排班管理 - HTTPS 域名反代配置
# 域名: www.sysuccmzb.cloud / sysuccmzb.cloud
# 证书: /etc/nginx/ssl/sysuccmzb.cloud.crt (full chain)
# 私钥: /etc/nginx/ssl/sysuccmzb.cloud.key

# ================== HTTP -> HTTPS ==================
server {
    listen 80;
    listen [::]:80;
    server_name www.sysuccmzb.cloud sysuccmzb.cloud;

    # 腾讯云健康检查放行（避免被判定为异常实例）
    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # 其余全部 301 到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ================== HTTPS 主服务 ==================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sysuccmzb.cloud sysuccmzb.cloud;

    # SSL 证书
    ssl_certificate     /etc/nginx/ssl/sysuccmzb.cloud.crt;
    ssl_certificate_key /etc/nginx/ssl/sysuccmzb.cloud.key;

    # SSL 优化
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全相关 header
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 上传大小（Excel 导入需要）
    client_max_body_size 20M;

    # ===== API 反代 → Node.js 后端 :3000 =====
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }

    # ===== 前端 SPA → nginx:alpine :8080 =====
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
