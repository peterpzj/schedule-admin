<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0369a1" />
  <meta name="description" content="诊室排班管理后台 - 维护医院排班数据" />
  <title>诊室排班管理后台</title>
  <!-- #P1-D1: Fira Code 数字字体（专用于排班统计、ID、工号 — 等宽数字看起来更整齐） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
  />
  <style>
    /* 首屏 loading：避免白屏 */
    html, body { margin: 0; padding: 0; height: 100%; background: #0369a1; }
    .app-loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #075985 0%, #0369a1 50%, #0ea5e9 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .app-loading.fade { opacity: 0; pointer-events: none; }
    /* #P2-图标: 替换 emoji 为 SVG */
    .app-loading-logo {
      width: 64px; height: 64px;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 12px rgba(14, 165, 233, 0.4));
    }
    .app-loading-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; letter-spacing: 2px; }
    .app-loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .app-loading-tip { margin-top: 20px; font-size: 13px; opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* #P2: 尊重 prefers-reduced-motion */
    @media (prefers-reduced-motion: reduce) {
      .app-loading-spinner { animation-duration: 3s; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-loading" id="app-loading" role="status" aria-live="polite">
      <svg class="app-loading-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 21V8a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v13"/>
        <path d="M9 21V12h6v9"/>
        <path d="M12 6v6"/>
        <path d="M9 9h6"/>
        <path d="M3 21h18"/>
      </svg>
      <div class="app-loading-title">诊室排班管理</div>
      <div class="app-loading-spinner" aria-label="加载中"></div>
      <div class="app-loading-tip">正在加载...</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
  <script>
    // Vue 挂载后移除首屏 loading
    window.addEventListener('DOMContentLoaded', () => {
      const remove = () => {
        const el = document.getElementById('app-loading');
        if (el) { el.classList.add('fade'); setTimeout(() => el.remove(), 400); }
      };
      // 兜底：最多等 5 秒强制移除
      setTimeout(remove, 5000);
      // 监听 app 元素变化（有 v-if 等触发）
      const obs = new MutationObserver(() => {
        if (document.getElementById('app-loading') && !document.getElementById('app-loading').classList.contains('fade')) {
          // 等 Vue 完全接管
          setTimeout(remove, 100);
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
      // 简化：直接 800ms 后移除
      setTimeout(remove, 800);
    });
  </script>
</body>
</html>
